# Blueprint Render (rootDir api recommandé).
# Si Root Directory reste vide : un package.json à la racine délègue install/start vers ./api.
# Doc : https://render.com/docs/monorepo-support
services:
  - type: web
    name: robloxapi
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
