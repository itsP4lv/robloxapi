# Blueprint Render — créer ou aligner depuis le dashboard.
# Sinon : Web Service → Settings → Root Directory = `api` (sans ce fichier).
# Doc monorepo : https://render.com/docs/monorepo-support
services:
  - type: web
    name: robloxapi
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
